name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

jobs:
  test:
    name: Typecheck & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Env-contamination gate
        run: bash scripts/check-no-env-contamination.sh

      - name: TypeScript typecheck (frontend)
        run: npx tsc --noEmit

      - name: TypeScript typecheck (server / vite config)
        run: npm run build:server

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build Storybook
        run: npx storybook build -o storybook-static

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - test
    if: always()

    steps:
      - name: Verify CI gate results
        run: |
          echo "Typecheck & Tests: ${{ needs.test.result }}"

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::Typecheck & Tests did not pass."
            exit 1
          fi

          echo "CI Summary: PASS"
