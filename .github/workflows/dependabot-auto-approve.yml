#
# OMN-6701: Auto-approve dependabot PRs so CI workflows trigger without
# manual approval in the GitHub Actions UI.
#
# GitHub requires first-party approval for workflow runs on PRs from
# dependabot. Without this workflow, dependabot PRs sit with 0 CI checks
# until someone manually approves the workflow run.
#
# This workflow uses pull_request_target (runs in the base branch context)
# to auto-approve the PR, which then allows the regular CI workflow
# (triggered by pull_request) to run.
name: Dependabot Auto-Approve

on:
  pull_request_target:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  approve:
    name: Auto-Approve Dependabot
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
