#
# CodeQL caller workflow — delegates to onex_change_control reusable workflow.
# OMN-5412
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

jobs:
  codeql:
    uses: OmniNode-ai/onex_change_control/.github/workflows/codeql-reusable.yml@main
    with:
      language: javascript-typescript
    permissions:
      actions: read
      contents: read
      security-events: write
    # Code Scanning (Advanced Security) may not yet be enabled on this repo.
    # continue-on-error prevents a GitHub-settings gap from blocking PR merges
    # while the feature is being provisioned. Remove once Code Security is on.
    continue-on-error: true
