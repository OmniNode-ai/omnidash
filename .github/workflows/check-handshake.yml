#
# Design note: omnidash-v2 is not an ONEX node, so this is a reinterpretation of the
# check-handshake concept rather than a verbatim port. "Handshake" here means verifying
# that v2's contract surface (shared/types/topics.ts) remains compatible with the
# upstream topic registry declared in omnibase_core — i.e., cross-repo contract surface
# compatibility (topic registry), not RRH node lifecycle validation.
name: Check Architecture Handshake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

jobs:
  check-handshake:
    name: Check architecture handshake
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout omnibase_core
        uses: actions/checkout@v4
        with:
          repository: OmniNode-ai/omnibase_core
          # Pinned to omnibase_core main as of 2026-04-26.
          # Update by running: gh api repos/OmniNode-ai/omnibase_core/commits/main --jq '.sha'
          ref: 9b567f689b8010ad1942a4d49d1ded4899588eb6
          path: omnibase_core

      - name: Verify omnibase_core checkout
        run: |
          if [ ! -f omnibase_core/architecture-handshakes/check-handshake.sh ]; then
            echo "::error::Failed to checkout omnibase_core or check-handshake.sh not found."
            exit 1
          fi

      - name: Verify v2 contract surface exists
        run: |
          if [ ! -f shared/types/topics.ts ]; then
            echo "::error::shared/types/topics.ts not found — v2 contract surface missing."
            exit 1
          fi

      - name: Check architecture handshake
        run: bash omnibase_core/architecture-handshakes/check-handshake.sh
        env:
          # Signal to the handshake script that this is a dashboard consumer repo,
          # not a node repo — the script may use this to select the appropriate
          # validation path.
          ONEX_REPO_TYPE: dashboard
